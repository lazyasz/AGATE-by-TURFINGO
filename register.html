<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Agate Esports account and start competing.">
  <title>Register — Agate Esports</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🎮</text></svg>">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">AGATE<span>ESPORTS</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="tournaments.html">Tournaments</a>
      <a href="team-registration.html">Register Team</a>
    </div>
    <div class="nav-auth"></div>
    <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  </nav>

  <main class="auth-page">
    <div class="auth-card fade-in" style="max-width:520px;">
      <h1 class="auth-title">Create <span style="color:var(--accent)">Account</span></h1>
      <p class="auth-subtitle">Join Agate Esports and start competing today.</p>
      <form id="register-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" placeholder="xBlaze" autocomplete="username">
            <div class="form-error" id="username-error"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" placeholder="you@email.com" autocomplete="email">
            <div class="form-error" id="email-error"></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password">
            <div class="form-error" id="password-error"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input class="form-input" type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password">
            <div class="form-error" id="confirm-password-error"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="role">I am a</label>
          <select class="form-input" id="role">
            <option value="player">Player</option>
            <option value="manager">Team Manager</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="gamertag">Gamertag / IGN</label>
            <input class="form-input" type="text" id="gamertag" placeholder="Your in-game name">
            <div class="form-error" id="gamertag-error"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="preferred-game">Preferred Game</label>
            <select class="form-input" id="preferred-game">
              <option value="">Select a game</option>
              <option value="valorant">Valorant</option>
              <option value="cs2">CS2</option>
              <option value="apex">Apex Legends</option>
              <option value="dota2">Dota 2</option>
              <option value="lol">League of Legends</option>
              <option value="pubg">PUBG Mobile</option>
            </select>
          </div>
        </div>
        <div class="form-group" id="reg-global-error" style="display:none;">
          <div class="form-error visible" id="global-msg"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem;">Create Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const ok = App.validate([
        { input: 'username', error: 'username-error', checks: [App.V.required('Username'), App.V.minLen(3)] },
        { input: 'email', error: 'email-error', checks: [App.V.required('Email'), App.V.email()] },
        { input: 'password', error: 'password-error', checks: [App.V.required('Password'), App.V.minLen(6)] },
        { input: 'confirm-password', error: 'confirm-password-error', checks: [App.V.required('Confirm Password'), App.V.match('password', 'Passwords')] },
        { input: 'gamertag', error: 'gamertag-error', checks: [App.V.required('Gamertag')] },
      ]);
      if (!ok) return;
      const result = App.register(
        document.getElementById('username').value.trim(),
        document.getElementById('email').value.trim(),
        document.getElementById('password').value,
        document.getElementById('role').value,
        document.getElementById('gamertag').value.trim(),
        document.getElementById('preferred-game').value
      );
      if (!result.ok) {
        document.getElementById('reg-global-error').style.display = 'block';
        document.getElementById('global-msg').textContent = result.msg;
      } else {
        App.toast('Account created! Welcome to Agate Esports.', 'success');
        setTimeout(() => { window.location.href = 'tournaments.html'; }, 600);
      }
    });
  </script>
</body>
</html>
