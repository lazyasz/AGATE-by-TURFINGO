<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Registration confirmed — Agate Esports">
  <title>Confirmed — Agate Esports</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🎮</text></svg>">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">AGATE<span>ESPORTS</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="tournaments.html">Tournaments</a>
      <a href="team-registration.html">Register Team</a>
    </div>
    <div class="nav-auth"></div>
    <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  </nav>

  <main class="confirm-wrapper">
    <div class="confirm-card fade-in" id="confirm-card">
      <div class="confirm-icon">✓</div>
      <h1 class="confirm-title">Registration Complete!</h1>
      <p class="confirm-subtitle">Your team has been registered successfully.</p>

      <div class="confirm-details" id="confirm-details">
        <!-- Populated by JS -->
      </div>

      <div id="players-list" style="text-align:left;margin-bottom:2rem;">
        <h3 style="font-family:var(--font-heading);font-size:0.75rem;letter-spacing:1.5px;color:var(--accent);margin-bottom:0.75rem;">ROSTER</h3>
        <div id="roster-chips"></div>
      </div>

      <div class="confirm-actions">
        <a href="tournaments.html" class="btn btn-outline">Browse Tournaments</a>
        <a href="index.html" class="btn btn-primary">Back to Home</a>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const teamId = params.get('id');
      const teams = App.getTeams();
      const team = teams.find(t => t.id === teamId);

      if (!team) {
        document.getElementById('confirm-details').innerHTML = '<p style="color:var(--text-secondary);">No registration data found. <a href="tournaments.html">Browse tournaments</a></p>';
        document.getElementById('roster-chips').innerHTML = '';
        return;
      }

      const tournament = App.getTournament(team.tournamentId);

      document.getElementById('confirm-details').innerHTML = `
        <div class="confirm-row"><span class="label">Registration ID</span><span class="value" style="color:var(--accent);font-family:var(--font-heading);font-size:0.85rem;">${team.regId}</span></div>
        <div class="confirm-row"><span class="label">Team Name</span><span class="value">${team.name} [${team.tag}]</span></div>
        <div class="confirm-row"><span class="label">Tournament</span><span class="value">${tournament ? tournament.title : team.tournamentId}</span></div>
        <div class="confirm-row"><span class="label">Game</span><span class="value">${tournament ? tournament.game : '—'}</span></div>
        <div class="confirm-row"><span class="label">Players</span><span class="value">${team.players.length} members</span></div>
        <div class="confirm-row"><span class="label">Registered</span><span class="value">${App.formatDate(team.registeredAt)}</span></div>
      `;

      document.getElementById('roster-chips').innerHTML = team.players.map(p =>
        `<span class="player-chip">👤 ${p.name} <span style="color:var(--accent);font-size:0.7rem;">${p.role}</span></span>`
      ).join('');
    });
  </script>
</body>
</html>
